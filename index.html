<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Is It Skaff's Bachelor Party Yet?</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
      font-family: Arial, sans-serif;
    }
    #message {
      font-size: 10vw;
      font-weight: bold;
      color: red;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="message"></div>
  <script>
    const today = new Date();

    const noUntil = new Date("June 11, 2026");
    const yesStart = new Date("June 11, 2026");
    const yesEnd = new Date("June 14, 2026");
    const swedenStart = new Date("June 15, 2026");

    const messageDiv = document.getElementById("message");

    if (today < noUntil) {
      messageDiv.textContent = "NO";
    } else if (today >= yesStart && today <= yesEnd) {
      messageDiv.textContent = "YES!";
    } else if (today >= swedenStart) {
      messageDiv.textContent = "See you in Sweden";
    }
  </script>
</body>
</html>
