<head>
<meta charset="UTF-8">

<style>

}

  font-size:7vw;
  font-weight:bold;
}

#countdown{
  font-size:2vw;
  margin-top:15px;

.attendeeTitle{

  font-size:14px;
  font-weight:bold;
  letter-spacing:3px;

  margin-bottom:10px;

.bioImage{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:12px;
  display:block;
  margin:0 auto 20px auto;
  border:4px solid #ddd;
}

.red{ color:red; }
.green{ color:green; }
.blue{ color:blue; }
.purple{ color:purple; }

.label{
  font-weight:bold;
}
</style>
</head>

<body>

<div id="main"></div>
<div id="countdown"></div>
<div id="dailyBio"></div>

<script>
const partyDate = new Date("June 11, 2026 00:00:00");

const yesStart = new Date("June 11, 2026 00:00:00");
const yesEnd = new Date("June 14, 2026 23:59:59");

const swedenStart = new Date("June 15, 2026 00:00:00");

const weddingStart = new Date("July 23, 2026 00:00:00");
const weddingEnd = new Date("July 26, 2026 23:59:59");

const weddingAfter = new Date("July 27, 2026 00:00:00");

const bioStartDate = new Date("May 28, 2026 00:00:00");
const finalBioDay = 15;

const main = document.getElementById("main");
const countdown = document.getElementById("countdown");

function updateCountdown() {
  const now = new Date();
  const diff = partyDate - now;

  if (diff <= 0) {
    countdown.innerHTML = "";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  countdown.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

function updateMessages() {
  const now = new Date();

  if (now < yesStart) {
    const diff = partyDate - now;
    const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

    main.innerHTML = `NO, IT IS ${days} DAYS AWAY`;
    main.className = "red";
  }

  else if (now >= yesStart && now <= yesEnd) {
    main.innerHTML = "IT'S HERE! CAN SOMEONE CHECK ON AUSTIN?";
    main.className = "green";
    countdown.innerHTML = "";
  }

  else if (now >= swedenStart && now < weddingStart) {
    main.innerHTML = "See you in Sweden";
    main.className = "blue";
    countdown.innerHTML = "";
  }

  else if (now >= weddingStart && now <= weddingEnd) {
    main.innerHTML = "Wedding is here!";
    main.className = "purple";
    countdown.innerHTML = "";
  }

  else if (now >= weddingAfter) {
    main.innerHTML = "Best wedding ever?";
    main.className = "purple";
    countdown.innerHTML = "";
  }
}

const bachelorBios = [
  {
    day: 1,
    name: "Brandon Garber",

    hometown: "Wayne, NJ",
    college: "Indiana",

    bio: "Connor is also a father of two, two boys. A four year letterman of the almost legendary Dickinson soccer team, Connor used his tree trunk legs in the defensive backfield of the pitch keeping wannabe goalscorers out for four years. “Gravy” lived upstairs from Jesse senior year and Jesse has heard him make the bed rock with his college sweetheart, now wife, on more than a few occasions. Connor is one of the stalwarts of the Dick U friend group, and one of the last standing of Jesse’s friends who lives and works in New York. Though he has taken his family, car, lawnmower, grill, country club membership, and mortgage to the suburbs, Connor is still a regular presence in the city. Connor Gavey is the ultimate “come with guy” and is always there for the big moments and events.",

  },
  {

    college: "Wesleyan",
    bio: "Anthony Hanna, aka DJ Hanna, is the closest this group will get to meeting John Summit. In fact, Hanna once trekked to a cave in rural Tennessee to see John Summit perform. A former risk recruiting teammate of Jesse’s and Anthony McCann’s, also attending this weekend, Hanna is a Phaidon vet who is as much of an expert on the phones as he is on the decks. For some strange reason as a kid, although he is from Connecticut, he chose to be a Colts fan so feel free to ask him about that this weekend.",
    notableMoment: "Although there are two legendary Vegas trips to choose from, Hanna’s best pick came planning an all time dinner on a different bachelor party that included a live DJ set and 15 course dinner in Scottsdale where he correctly pointed out every single song the DJ played within the first 3 seconds of music being played.",
    beerCount: "41.5"
  },

    day: 4,

function getCurrentBioDay() {
  const now = new Date();
  const start = new Date(bioStartDate);

  start.setHours(0, 0, 0, 0);
  now.setHours(0, 0, 0, 0);

  const diff = now - start;
  const day = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;

  if (day < 1) return 1;
  if (day > finalBioDay) return finalBioDay;

  return day;
}

function getBioForToday() {
  const currentDay = getCurrentBioDay();

  const bio = bachelorBios.find(person => person.day === currentDay);

  if (bio) return bio;

  return {
    day: currentDay,
    name: "Bio Coming Soon",
    imageBase: "placeholder",
    heightWeight: "TBD",
    hometown: "TBD",
    college: "TBD",
    bio: "More scouting reports are coming soon. No repeats. No skipped beers.",
    notableMoment: "TBD",
    beerCount: "TBD"
  };
}

function setImageFallbacks(img, imageBase) {
  const extensions = ["jpg", "jpeg", "png", "webp"];
  let index = 0;

  img.src = `${imageBase}.${extensions[index]}`;

  img.onerror = function() {
    index++;

    if (index < extensions.length) {
      img.src = `${imageBase}.${extensions[index]}`;
    } else {
      img.onerror = null;
      img.src = "placeholder.jpg";
    }
  };
}

function loadDailyBio() {
  const selectedBio = getBioForToday();

  document.getElementById("dailyBio").innerHTML = `
    <div class="attendeeTitle">
      ATTENDEE OF THE DAY
    </div>

    <h2>
      DAY ${selectedBio.day}: ${selectedBio.name}
    </h2>

    <img
      id="bioImage"
      alt="${selectedBio.name}"
      class="bioImage"
    >

    <p>
      <span class="label">H/W:</span>
      ${selectedBio.heightWeight}
    </p>

    <p>
      <span class="label">Hometown:</span>
      ${selectedBio.hometown}
    </p>

    <p>
      <span class="label">College:</span>
      ${selectedBio.college}
    </p>

    <p>${selectedBio.bio}</p>

    <p>
      <span class="label">Notable Moment:</span>
      ${selectedBio.notableMoment}
    </p>

    <p>
      <span class="label">Weekend Beer Count O/U:</span>
      ${selectedBio.beerCount}
    </p>
  `;

  setImageFallbacks(document.getElementById("bioImage"), selectedBio.imageBase);
}

setInterval(updateCountdown, 1000);
setInterval(updateMessages, 60000);

updateCountdown();
updateMessages();
loadDailyBio();
</script>

</body>
</html>
