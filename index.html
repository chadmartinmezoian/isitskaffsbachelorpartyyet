const countdown = document.getElementById("countdown");

function updateCountdown() {
  const now = new Date();
  const diff = partyDate - now;

  if (diff <= 0) {
    countdown.innerHTML = "";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  countdown.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

function updateMessages() {
  const now = new Date();

  if (now < yesStart) {
    const diff = partyDate - now;
    const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

    main.innerHTML = `NO, IT IS ${days} DAYS AWAY`;
    main.className = "red";
  }

  else if (now >= yesStart && now <= yesEnd) {
    main.innerHTML = "IT'S HERE! CAN SOMEONE CHECK ON AUSTIN?";
    main.className = "green";
    countdown.innerHTML = "";
  }

  else if (now >= swedenStart && now < weddingStart) {
    main.innerHTML = "See you in Sweden";
    main.className = "blue";
    countdown.innerHTML = "";
  }

  else if (now >= weddingStart && now <= weddingEnd) {
    main.innerHTML = "Wedding is here!";
    main.className = "purple";
    countdown.innerHTML = "";
  }

  else if (now >= weddingAfter) {
    main.innerHTML = "Best wedding ever?";
    main.className = "purple";
    countdown.innerHTML = "";
  }
}

const finalBioDay = Math.max(...bachelorBios.map(person => person.day));

function getCurrentBioDay() {
  const now = new Date();
  const start = new Date(bioStartDate);

  start.setHours(0, 0, 0, 0);
  now.setHours(0, 0, 0, 0);

  const diff = now - start;
  const day = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;

  if (day < 1) return 1;
  if (day > finalBioDay) return finalBioDay;

  return day;
}

function getBioForToday() {
  const currentDay = getCurrentBioDay();
  const bio = bachelorBios.find(person => person.day === currentDay);

  if (bio) return bio;

  return {
    day: currentDay,
    name: "Bio Coming Soon",
    imageBase: "placeholder",
    heightWeight: "TBD",
    hometown: "TBD",
    college: "TBD",
    bio: "More scouting reports are coming soon. No repeats. No skipped beers.",
    notableMoment: "TBD",
    beerCount: "TBD"
  };
}

function setImageFallbacks(img, imageBase) {
  const extensions = ["jpg", "jpeg", "png", "webp"];
  let index = 0;

  img.src = `${imageBase}.${extensions[index]}`;

  img.onerror = function() {
    index++;

    if (index < extensions.length) {
      img.src = `${imageBase}.${extensions[index]}`;
    } else {
      img.onerror = null;
      img.src = "placeholder.jpg";
    }
  };
}

function resetMusicButtons() {

  countryButton.classList.remove("playing");
  saxButton.classList.remove("playing");
  reggaeButton.classList.remove("playing");
}

function stopAllSongs() {
  countrySong.pause();
  saxSong.pause();
  reggaeSong.pause();
}

    countrySong.pause();
    resetMusicButtons();

});
