const finalBioDay = Math.max(...bachelorBios.map(person => person.day));

function getCurrentBioDay() {
  const params = new URLSearchParams(window.location.search);
  const previewDay = params.get("day");

  if (previewDay) {
    const dayNumber = parseInt(previewDay, 10);

    if (!isNaN(dayNumber)) {
      if (dayNumber < 1) return 1;
      if (dayNumber > finalBioDay) return finalBioDay;

      return dayNumber;
    }
  }

  const now = new Date();
  const start = new Date(bioStartDate);

  start.setHours(0, 0, 0, 0);
  now.setHours(0, 0, 0, 0);

  const diff = now - start;
  const day = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;

  if (day < 1) return 1;
  if (day > finalBioDay) return finalBioDay;

  return day;
}

function isMontageDay() {
  const now = new Date();

  const params = new URLSearchParams(window.location.search);
  const previewMontage = params.get("montage");

  if (previewMontage === "true") {
    return true;
  }

  return now >= montageStart && now <= montageEnd;
}

function getBioForToday() {
  const currentDay = getCurrentBioDay();
  const bio = bachelorBios.find(person => person.day === currentDay);

  if (bio) return bio;

  return {
    day: currentDay,
    name: "Bio Coming Soon",
    imageBase: "placeholder",
    heightWeight: "TBD",
    hometown: "TBD",
    college: "TBD",
    bio: "More scouting reports are coming soon. No repeats. No skipped beers.",
    notableMoment: "TBD",
    beerCount: "TBD"
  };
}

function setImageFallbacks(img, imageBase) {
  const extensions = ["jpg", "jpeg", "png", "webp"];
  let index = 0;

  img.src = `${imageBase}.${extensions[index]}`;

  img.onerror = function() {
    index++;

    if (index < extensions.length) {
      img.src = `${imageBase}.${extensions[index]}`;
    } else {
      img.onerror = null;
      img.src = "placeholder.jpg";
    }
  };
}

function startConfetti() {
  const emojis = ["🍻", "🎉", "⚾", "🏆", "❤️"];

  for (let i = 0; i < 40; i++) {
    const confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.animationDelay = Math.random() * 1.5 + "s";

    document.body.appendChild(confetti);

    setTimeout(() => {
      confetti.remove();
    }, 4000);
  }
}

function loadDailyBio() {
  const dailyBio = document.getElementById("dailyBio");
  const sportsMashupContainer = document.getElementById("sportsMashupContainer");
  const sportsMashupVideo = document.getElementById("sportsMashupVideo");

  if (isMontageDay()) {
    dailyBio.style.display = "none";
    sportsMashupContainer.style.display = "block";

    sportsMashupVideo.play().catch(() => {});
    return;
  }

  sportsMashupContainer.style.display = "none";
  sportsMashupVideo.pause();

  dailyBio.style.display = "block";

  const selectedBio = getBioForToday();
  const isJesseDay = selectedBio.tributes && selectedBio.tributes.length > 0;

  dailyBio.innerHTML = `
    <div class="attendeeTitle">
      ${isJesseDay ? "MESSAGES FOR THE BACHELOR" : "ATTENDEE OF THE DAY"}
    </div>

    <h2>
      DAY ${selectedBio.day}: ${selectedBio.name}
    </h2>

    <img
      id="bioImage"
      alt="${selectedBio.name}"
      class="bioImage"
    >

    <p>
      <span class="label">H/W:</span>
      ${selectedBio.heightWeight}
    </p>

    <p>
      <span class="label">Hometown:</span>
      ${selectedBio.hometown}
    </p>

    <p>
      <span class="label">College:</span>
      ${selectedBio.college}
    </p>

    <p>
      <span class="label">Weekend Beer Count O/U:</span>
      ${selectedBio.beerCount}
    </p>

    ${isJesseDay ? `
      <div class="tributeSection">
        <div class="label">Messages for Jesse:</div>

        <div id="tributeCard">
          <div id="tributeAuthor"></div>
          <div id="tributeText"></div>
        </div>

        <div class="tributeButtons">
          <button id="prevTribute" type="button">← Previous</button>
          <span id="tributeCounter"></span>
          <button id="nextTribute" type="button">Next →</button>
        </div>
      </div>
    ` : `
      <p>${selectedBio.bio}</p>

      <p>
        <span class="label">Notable Moment:</span>
        ${selectedBio.notableMoment}
      </p>
    `}
  `;

  setImageFallbacks(document.getElementById("bioImage"), selectedBio.imageBase);

  if (isJesseDay) {
    let tributeIndex = Math.floor(Math.random() * selectedBio.tributes.length);

    const tributeAuthor = document.getElementById("tributeAuthor");
    const tributeText = document.getElementById("tributeText");
    const tributeCounter = document.getElementById("tributeCounter");
    const prevTribute = document.getElementById("prevTribute");
    const nextTribute = document.getElementById("nextTribute");

    function renderTribute() {
      const tribute = selectedBio.tributes[tributeIndex];

      tributeAuthor.innerHTML = tribute.author;
      tributeText.innerHTML = tribute.text;
      tributeCounter.innerHTML = `${tributeIndex + 1} / ${selectedBio.tributes.length}`;
    }

    prevTribute.addEventListener("click", () => {
      tributeIndex =
        tributeIndex === 0
          ? selectedBio.tributes.length - 1
          : tributeIndex - 1;

      renderTribute();
    });

    nextTribute.addEventListener("click", () => {
      tributeIndex =
        tributeIndex === selectedBio.tributes.length - 1
          ? 0
          : tributeIndex + 1;

      renderTribute();
    });

    renderTribute();
    startConfetti();
  }
}

const countrySong = document.getElementById("countrySong");
const saxSong = document.getElementById("saxSong");
const reggaeSong = document.getElementById("reggaeSong");

const countryButton = document.getElementById("countryButton");
const saxButton = document.getElementById("saxButton");
const reggaeButton = document.getElementById("reggaeButton");

function resetMusicButtons() {
  countryButton.innerHTML = "🤠 A Hundred Billion Beers (Country)";
  saxButton.innerHTML = "🎷 A Hundred Billion Beers (Saxhouse)";
  reggaeButton.innerHTML = "🌴 A Hundred Billion Beers (Reggae)";

  countryButton.classList.remove("playing");
  saxButton.classList.remove("playing");
  reggaeButton.classList.remove("playing");
}

function stopAllSongs() {
  countrySong.pause();
  saxSong.pause();
  reggaeSong.pause();
}

countryButton.addEventListener("click", () => {
  if (!countrySong.paused) {
    countrySong.pause();
    resetMusicButtons();
    return;
  }

  stopAllSongs();
  resetMusicButtons();

  countrySong.play();

  countryButton.innerHTML = "⏸️ Pause Country Version";
  countryButton.classList.add("playing");
});

saxButton.addEventListener("click", () => {
  if (!saxSong.paused) {
    saxSong.pause();
    resetMusicButtons();
    return;
  }

  stopAllSongs();
  resetMusicButtons();

  saxSong.play();

  saxButton.innerHTML = "⏸️ Pause Saxhouse Version";
  saxButton.classList.add("playing");
});

reggaeButton.addEventListener("click", () => {
  if (!reggaeSong.paused) {
    reggaeSong.pause();
    resetMusicButtons();
    return;
  }

  stopAllSongs();
  resetMusicButtons();

  reggaeSong.play();

  reggaeButton.innerHTML = "⏸️ Pause Reggae Version";
  reggaeButton.classList.add("playing");
});

setInterval(updateCountdown, 1000);
setInterval(updateMessages, 60000);

updateCountdown();
updateMessages();
loadDailyBio();
