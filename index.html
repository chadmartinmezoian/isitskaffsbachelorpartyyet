<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Is It Skaff's Bachelor Party Yet?</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
      font-family: Arial, sans-serif;
      flex-direction: column;
      text-align: center;
    }
    #main-message {
      font-size: 10vw;
      font-weight: bold;
      color: red;
    }
    #sub-message {
      font-size: 3vw;
      color: red;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div id="main-message"></div>
  <div id="sub-message"></div>

  <script>
    const today = new Date();

    const noUntil = new Date("June 11, 2026");
    const yesStart = new Date("June 11, 2026");
    const yesEnd = new Date("June 14, 2026");
    const swedenStart = new Date("June 15, 2026");

    const mainMessage = document.getElementById("main-message");
    const subMessage = document.getElementById("sub-message");

    if (today < noUntil) {
      mainMessage.textContent = "NO";
      subMessage.textContent = "(But Go Sox)";
    } else if (today >= yesStart && today <= yesEnd) {
      mainMessage.textContent = "YES!";
      subMessage.textContent = "";
    } else if (today >= swedenStart) {
      mainMessage.textContent = "See you in Sweden";
      subMessage.textContent = "";
    }
  </script>
</body>
</html>
